<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Simple Input Tool</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 16px;
        }
        p {
            color: #666;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Data Input Tool</h2>
    <p>Type something below:</p>
    
    <input type="text" id="userInput" placeholder="Enter your data here..." oninput="showData()">
    
    <div id="displayArea" style="margin-top: 15px; font-size: 18px; color: #333; font-weight: bold;"></div>
</div>

<script>
// This function watches the input field and changes the text live
function showData() {
    let inputData = document.getElementById('userInput').value;
    document.getElementById('displayArea').innerText = inputData;
}
</script>

</body>
</html>
