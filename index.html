<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Poster URL Tool</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; background-color: #f4f4f9; }
        input { padding: 10px; width: 300px; margin-bottom: 10px; }
        button { padding: 10px 20px; background-color: #24292e; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #444; }
    </style>
</head>
<body>
    <h1>Poster URL Tool</h1>
    <p>Enter your details below:</p>
    <input type="text" id="urlInput" placeholder="Paste link here..."><br>
    <button onclick="processURL()">Process</button>
    <p id="result"></p>

    <script>
        function processURL() {
            let input = document.getElementById('urlInput').value;
            document.getElementById('result').innerText = "You entered: " + input;
        }
    </script>
</body>
</html>
